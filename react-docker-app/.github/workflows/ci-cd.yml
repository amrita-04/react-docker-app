# updated pipeline
name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t react-app .

      - name: Run Container
        run: docker run -d -p 8080:8080 react-app